<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya-L1 Space Command Center - Unified Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>
    <style>
        body { margin: 0; background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';
        
        const { useState, useEffect, useRef, useMemo } = React;

        // Custom icon components since lucide-react might be tricky in standalone UMD
        const Icons = {
            Radio: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.4m2.8-11.2c3.9 3.9 3.9 10.2 0 14.1M7.8 7.8c-2.3 2.3-2.3 6.1 0 8.4m-2.8-11.2c-3.9 3.9-3.9 10.2 0 14.1"/></svg>,
            Zap: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Move: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>,
            Database: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>,
            Command: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="red" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        };

        const SparkLine = ({ data, color, height = 40 }) => {
            if (!data || data.length === 0) return null;
            const max = Math.max(...data);
            const min = Math.min(...data);
            const points = data.map((v, i) => `${(i / (data.length - 1)) * 100},${height - ((v - min) / (max - min + 1e-6)) * height}`).join(' ');
            return (
                <svg viewBox={`0 0 100 ${height}`} className="w-full h-full overflow-visible">
                    <polyline fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" points={points} />
                </svg>
            );
        };

        const ThreeEngine = ({ pilotMode, activeInstrument, flux, playbackProgress }) => {
            const mountRef = useRef(null);
            const cameraRef = useRef(null);
            const controlsRef = useRef(null);
            const chassisRef = useRef(null);
            const glowMaterialRef = useRef(null);

            const instrumentPositions = useMemo(() => ({
                DEFAULT: { x: 0, y: 0, z: 25 },
                VELC: { x: 0, y: 3, z: 12 },
                SUIT: { x: 2, y: 1, z: 14 },
                SoLEXS: { x: -2, y: 1, z: 14 },
                MAG: { x: 0, y: -4, z: 15 },
                ASPEX: { x: 3, y: 0, z: 12 },
                PAPA: { x: -3, y: 0, z: 12 },
                HEL1OS: { x: 0, y: 0, z: 10 }
            }), []);

            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                cameraRef.current = camera;
                
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                mountRef.current.appendChild(renderer.domElement);

                const controls = new OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.enabled = false;
                controlsRef.current = controls;

                // Stars
                const starGeo = new THREE.BufferGeometry();
                const starPos = new Float32Array(8000 * 3);
                for(let i=0; i<24000; i++) starPos[i] = (Math.random() - 0.5) * 1000;
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
                scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.15})));

                // Sun with Plasma Glow
                const sun = new THREE.Mesh(new THREE.SphereGeometry(6, 64, 64), new THREE.MeshBasicMaterial({ color: 0xffcc33 }));
                sun.position.set(-80, 40, -150);
                scene.add(sun);
                const sunGlow = new THREE.Mesh(new THREE.SphereGeometry(7.5, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffa500, transparent: true, opacity: 0.2 }));
                sunGlow.position.copy(sun.position);
                scene.add(sunGlow);

                const pLight = new THREE.PointLight(0xffffff, 5, 1000);
                pLight.position.copy(sun.position);
                scene.add(pLight);
                scene.add(new THREE.AmbientLight(0x404040, 2));

                // Aditya-L1 High-Resolution Model (Simulated)
                const chassis = new THREE.Group();
                const core = new THREE.Mesh(new THREE.BoxGeometry(2, 2.5, 2), new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.1 }));
                const energyGlow = new THREE.Mesh(new THREE.BoxGeometry(2.1, 2.6, 2.1), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.1 }));
                glowMaterialRef.current = energyGlow.material;
                chassis.add(core, energyGlow);
                
                // Payload Appendages
                const velcBox = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 1.5), new THREE.MeshStandardMaterial({color: 0x333333}));
                velcBox.position.set(0, 1.5, 0.5);
                chassis.add(velcBox);

                const panelMat = new THREE.MeshStandardMaterial({ color: 0x001133, metalness: 0.8, roughness: 0.3 });
                const armL = new THREE.Mesh(new THREE.BoxGeometry(8, 0.05, 2.5), panelMat); armL.position.x = -5;
                const armR = new THREE.Mesh(new THREE.BoxGeometry(8, 0.05, 2.5), panelMat); armR.position.x = 5;
                chassis.add(armL, armR);
                scene.add(chassis);
                chassisRef.current = chassis;

                // Solar Wind Particle Flow
                const pGeo = new THREE.BufferGeometry();
                const pCount = 3000;
                const pPos = new Float32Array(pCount * 3);
                const pVel = new Float32Array(pCount);
                for(let i=0; i<pCount; i++) {
                    pPos[i*3] = (Math.random()-0.5)*30;
                    pPos[i*3+1] = (Math.random()-0.5)*30;
                    pPos[i*3+2] = (Math.random()-0.5)*20;
                    pVel[i] = 0.05 + Math.random()*0.15;
                }
                pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
                const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x00ffff, size: 0.04, transparent: true, opacity: 0.3 }));
                scene.add(particles);

                camera.position.z = 25;

                const animate = () => {
                    requestAnimationFrame(animate);
                    if (!controls.enabled) {
                        const target = instrumentPositions[activeInstrument] || instrumentPositions.DEFAULT;
                        const targetVec = new THREE.Vector3(target.x, target.y, target.z);
                        camera.position.lerp(targetVec, 0.04);
                        camera.lookAt(chassis.position);
                    } else {
                        controls.update();
                    }
                    if (glowMaterialRef.current) {
                        glowMaterialRef.current.opacity = 0.1 + (flux / 6000) * 0.7;
                    }
                    if (chassisRef.current) {
                        chassisRef.current.rotation.y += 0.003 + (playbackProgress * 0.015);
                        chassisRef.current.position.y = Math.sin(Date.now() * 0.001) * 0.1;
                    }
                    const posArray = pGeo.attributes.position.array;
                    for(let i=0; i<pCount; i++) {
                        posArray[i*3+2] += pVel[i] * (1 + playbackProgress * 4);
                        if(posArray[i*3+2] > 40) posArray[i*3+2] = -15;
                    }
                    pGeo.attributes.position.needsUpdate = true;
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);
                return () => {
                    window.removeEventListener('resize', handleResize);
                    mountRef.current?.removeChild(renderer.domElement);
                };
            }, [activeInstrument]);

            useEffect(() => {
                if (controlsRef.current) controlsRef.current.enabled = pilotMode;
            }, [pilotMode]);

            return <div ref={mountRef} className="absolute inset-0 z-0" />;
        };

        const App = () => {
            const [pilotMode, setPilotMode] = useState(false);
            const [activeInstrument, setActiveInstrument] = useState('DEFAULT');
            const [playbackProgress, setPlaybackProgress] = useState(0.4);
            const [diagnostics, setDiagnostics] = useState({});
            
            const instruments = {
                VELC: { name: "Spectroscopic Coronagraph", metric: "Doppler Shift", unit: "mA", color: "#3b82f6" },
                SUIT: { name: "UV Imaging Telescope", metric: "UV Intensity", unit: "W/m²", color: "#8b5cf6" },
                MAG: { name: "Triaxial Magnetometer", metric: "B-Total", unit: "nT", color: "#10b981" },
                ASPEX: { name: "Plasma Analyzer", metric: "Proton Flux", unit: "n/cm²", color: "#f59e0b" },
                PAPA: { name: "Plasma Composition", metric: "Ion Ratio", unit: "α/p", color: "#ef4444" },
                SoLEXS: { name: "Soft X-ray Spectrometer", metric: "X-Flux", unit: "ph/s", color: "#ec4899" },
                HEL1OS: { name: "Hard X-ray Spectrometer", metric: "HE-Flux", unit: "ph/s", color: "#6366f1" }
            };

            // Simulated Syncing Science Data
            const scienceData = useMemo(() => {
                return Object.keys(instruments).reduce((acc, key) => {
                    acc[key] = Array.from({length: 30}, (_, i) => {
                        const base = key === 'VELC' ? 0 : 100;
                        const shock = (i > 20 && playbackProgress > 0.7) ? 500 : 0;
                        return base + Math.random() * 50 + shock;
                    });
                    return acc;
                }, {});
            }, [playbackProgress]);

            const flux = 800 + (playbackProgress * 4500);
            const timeToEvent = Math.max(0, (1 - playbackProgress) * 48);

            return (
                <div className="fixed inset-0 flex overflow-hidden">
                    <ThreeEngine 
                        pilotMode={pilotMode} 
                        activeInstrument={activeInstrument} 
                        flux={flux}
                        playbackProgress={playbackProgress}
                    />

                    {/* Dashboard Wrapper */}
                    <div className="absolute inset-0 z-10 pointer-events-none p-8 flex flex-col justify-between">
                        {/* Top Navigation */}
                        <header className="flex justify-between items-start pointer-events-auto">
                            <div className="glass p-6 rounded-[2rem] w-96 shadow-2xl space-y-4">
                                <div className="flex items-center gap-4">
                                    <div className="p-2 bg-blue-500/20 rounded-xl">
                                        <Icons.Radio />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-black tracking-tight">ADITYA-L1</h1>
                                        <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest leading-none">Space Weather Intelligence</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                                    <div>
                                        <p className="text-[9px] uppercase text-slate-500 font-bold">Latency</p>
                                        <p className="text-sm font-mono text-blue-400">1.282 SEC</p>
                                    </div>
                                    <div>
                                        <p className="text-[9px] uppercase text-slate-500 font-bold">Pipeline</p>
                                        <p className="text-sm font-mono text-green-400">PRADAN_SYNC</p>
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col items-end gap-4">
                                <div className="glass p-4 rounded-3xl flex items-center gap-6 shadow-2xl">
                                    <button 
                                        className={`flex items-center gap-3 px-8 py-3.5 rounded-2xl transition-all duration-500 ${pilotMode ? 'bg-blue-600 shadow-lg shadow-blue-600/20 text-white' : 'bg-white/5 text-slate-400 hover:bg-white/10'}`}
                                        onClick={() => setPilotMode(!pilotMode)}
                                    >
                                        <Icons.Move />
                                        <span className="font-black uppercase text-xs tracking-tighter">Pilot Explorer</span>
                                    </button>
                                    <div className="h-10 w-px bg-white/10"></div>
                                    <div className="px-2">
                                        <p className="text-[9px] text-slate-500 uppercase font-black mb-1">Alert Matrix</p>
                                        <div className="flex items-center gap-2">
                                            {flux > 3500 && <Icons.Alert />}
                                            <p className={`text-sm font-black ${flux > 3500 ? 'text-red-500 animate-pulse' : 'text-emerald-400'}`}>
                                                {flux > 3500 ? 'CME_ENGAGED' : 'HELIOS_STABLE'}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                
                                {activeInstrument !== 'DEFAULT' && (
                                    <div className="glass p-6 rounded-[2rem] w-80 animate-in fade-in slide-in-from-right-10 duration-500">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-sm font-black uppercase text-slate-400">{activeInstrument}</h3>
                                            <span className="text-[10px] font-mono text-blue-500">SYNC_OK</span>
                                        </div>
                                        <div className="h-20 mb-4 opacity-80">
                                            <SparkLine data={scienceData[activeInstrument]} color={instruments[activeInstrument].color} />
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] text-slate-500 font-bold uppercase">{instruments[activeInstrument].metric}</p>
                                            <p className="text-2xl font-black">
                                                {scienceData[activeInstrument][29].toFixed(2)} <span className="text-xs text-slate-500 font-normal">{instruments[activeInstrument].unit}</span>
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </header>

                        {/* Footer Controls */}
                        <footer className="flex justify-between items-end pointer-events-auto">
                            <div className="glass p-8 rounded-[2.5rem] w-[550px] shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-5">
                                    <Icons.Radio />
                                </div>
                                <div className="flex items-center justify-between mb-6">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-yellow-500/20 rounded-xl">
                                            <Icons.Zap />
                                        </div>
                                        <div>
                                            <h2 className="text-sm font-black uppercase tracking-tight">Temporal Fusion Prognosis</h2>
                                            <p className="text-[9px] font-mono text-slate-500">TFT-CNN Architecture (168h Lookback)</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[9px] font-bold text-slate-500 uppercase leading-none">CME Prediction</p>
                                        <p className="text-lg font-black text-blue-400">-{timeToEvent.toFixed(1)} HRS</p>
                                    </div>
                                </div>
                                
                                <div className="relative h-1.5 w-full bg-white/5 rounded-full mb-6">
                                    <div className="absolute inset-0 bg-blue-600/20 rounded-full blur-[2px]"></div>
                                    <input 
                                        type="range" min="0" max="1" step="0.001" 
                                        value={playbackProgress}
                                        onChange={(e) => setPlaybackProgress(parseFloat(e.target.value))}
                                        className="absolute inset-0 w-full opacity-0 cursor-pointer z-10"
                                    />
                                    <div className="absolute inset-y-0 left-0 bg-gradient-to-r from-blue-600 to-cyan-400 rounded-full transition-all duration-300" style={{width: `${playbackProgress * 100}%`}}>
                                        <div className="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full shadow-[0_0_15px_rgba(59,130,246,0.8)] border-2 border-blue-600"></div>
                                    </div>
                                </div>
                                
                                <div className="flex justify-between text-[10px] font-mono font-bold text-slate-500">
                                    <div className="flex gap-4">
                                        <span>2024-05-10T00:00:00</span>
                                        <span className="text-blue-500">MISSION_BASELINE</span>
                                    </div>
                                    <span className={playbackProgress > 0.8 ? 'text-red-500 animate-pulse' : ''}>MAY_SOLAR_STORM_IMPACT</span>
                                </div>
                            </div>

                            <div className="flex gap-4">
                                <div className="glass px-10 py-5 rounded-[2rem] flex items-center gap-4 shadow-2xl hover:bg-white/10 transition-colors cursor-pointer group">
                                    <div className="flex flex-col items-end">
                                        <p className="text-[10px] font-black text-slate-400 group-hover:text-white transition-colors">TFT_TRAINING</p>
                                        <p className="text-xs font-mono text-green-500">CONVERGED</p>
                                    </div>
                                    <Icons.Command />
                                </div>
                            </div>
                        </footer>
                    </div>

                    {/* Right Sidebar: Instruments */}
                    <aside className="w-96 h-full border-r border-white/5 bg-[#020617]/60 backdrop-blur-3xl p-8 z-20 flex flex-col gap-8 pointer-events-auto">
                        <div className="flex items-center gap-4 mb-2">
                            <div className="p-3 bg-white/5 rounded-2xl">
                                <Icons.Database />
                            </div>
                            <div>
                                <h2 className="text-xl font-black tracking-tight">Mission Payloads</h2>
                                <p className="text-[9px] font-mono text-slate-500 uppercase">Synchronized Telemetry</p>
                            </div>
                        </div>

                        <div className="space-y-4 flex-1 overflow-y-auto pr-4 custom-scrollbar">
                            {Object.entries(instruments).map(([key, info]) => (
                                <div 
                                    key={key} 
                                    onClick={() => { setActiveInstrument(key); setPilotMode(false); }}
                                    className={`group p-5 rounded-[2rem] border transition-all duration-500 cursor-pointer flex flex-col gap-3 ${activeInstrument === key ? 'bg-white/10 border-white/20 shadow-xl' : 'bg-white/5 border-transparent hover:bg-white/8'}`}
                                >
                                    <div className="flex justify-between items-start">
                                        <div className="flex flex-col">
                                            <span className={`text-[10px] font-black uppercase tracking-widest transition-colors ${activeInstrument === key ? 'text-blue-400' : 'text-slate-500'}`}>{key}</span>
                                            <h3 className={`text-xs font-bold tracking-tight transition-colors ${activeInstrument === key ? 'text-white' : 'text-slate-300'}`}>{info.name}</h3>
                                        </div>
                                        <div className={`w-2 h-2 rounded-full shadow-[0_0_10px] ${activeInstrument === key ? 'bg-blue-500 shadow-blue-500' : 'bg-slate-700'}`}></div>
                                    </div>
                                    
                                    {activeInstrument === key && (
                                        <div className="flex items-end justify-between mt-2 animate-in fade-in slide-in-from-top-2">
                                            <div className="text-[9px] font-mono text-slate-500">
                                                HEALTH: 100%<br/>
                                                FREQ: 10SEC
                                            </div>
                                            <div className="text-right">
                                                <p className="text-lg font-black text-white">{scienceData[key][29].toFixed(1)}</p>
                                                <p className="text-[8px] font-bold text-slate-500 uppercase">{info.unit}</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        <div className="pt-8 border-t border-white/5">
                            <div className="glass p-4 rounded-2xl flex items-center justify-between group cursor-pointer hover:bg-white/10 transition-all" onClick={() => setActiveInstrument('DEFAULT')}>
                                <span className="text-[10px] font-black text-slate-500 group-hover:text-white uppercase tracking-widest">Global Viewport</span>
                                <div className="w-2 h-2 rounded-full border border-slate-500 group-hover:bg-blue-600 group-hover:border-blue-600 transition-all"></div>
                            </div>
                        </div>
                    </aside>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
